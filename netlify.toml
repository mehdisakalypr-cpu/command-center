# ══════════════════════════════════════════════
#  THE ESTATE — Configuration Netlify
# ══════════════════════════════════════════════

[build]
  publish = "."

# ── HTTPS et www→apex gérés nativement par Netlify ────────

# ── En-têtes de sécurité — toutes les pages ───
[[headers]]
  for = "/*"
  [headers.values]
    # HSTS : force HTTPS pendant 1 an, incluant sous-domaines
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Empêche le clickjacking (iframe depuis un autre domaine)
    X-Frame-Options            = "SAMEORIGIN"
    # Empêche le MIME-sniffing
    X-Content-Type-Options     = "nosniff"
    # Limite les infos du referrer aux requêtes same-origin
    Referrer-Policy            = "strict-origin-when-cross-origin"
    # Désactive les APIs inutiles (géoloc non requise, caméra non requise)
    Permissions-Policy         = "camera=(), microphone=(self), geolocation=(), payment=()"
    # Protection XSS legacy (IE/Edge anciens)
    X-XSS-Protection           = "1; mode=block"

# ── Cache HTML : jamais mis en cache (auth côté client) ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"

# ── Cache JS/CSS : 1 an (assets statiques) ────
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Page 404 personnalisée ────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
