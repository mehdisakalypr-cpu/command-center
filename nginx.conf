# ══════════════════════════════════════════════
#  THE ESTATE — Configuration Nginx (référence)
#  Adapter : remplacer "the-estate.com" et les
#  chemins SSL par les vôtres.
# ══════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen      80;
    listen      [::]:80;
    server_name the-estate.com www.the-estate.com;
    return 301  https://the-estate.com$request_uri;
}

# Redirect www → apex HTTPS
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name www.the-estate.com;

    ssl_certificate     /etc/letsencrypt/live/the-estate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the-estate.com/privkey.pem;

    return 301  https://the-estate.com$request_uri;
}

# Serveur principal HTTPS
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name the-estate.com;

    root  /var/www/the-estate;
    index index.html;

    # ── SSL (Let's Encrypt via certbot) ──────
    ssl_certificate     /etc/letsencrypt/live/the-estate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the-estate.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── En-têtes de sécurité ─────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(self), geolocation=(), payment=()" always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    server_tokens off;

    # ── Compression Gzip ─────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_types      text/html text/css application/javascript application/json image/svg+xml;

    # ── Cache HTML : pas de cache ─────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires    0;
    }

    # ── Cache JS/CSS : 1 an ──────────────────
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires    1y;
    }

    # ── Cache images/fonts : 6 mois ──────────
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|woff|woff2)$ {
        add_header Cache-Control "public, max-age=15552000";
        expires    6M;
    }

    # ── Fallback SPA ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Bloquer fichiers sensibles ────────────
    location ~ /\.(git|env) {
        deny all;
    }
}
