# Firewall rules for cc-worker-* users. Apply via `ufw` on the host (requires root).
# Blueprint: memory/project_cc_dual_account_architecture.md (v2 §8 Isolation)
#
# Strategy: workers can reach Supabase, GitHub API/git, Anthropic API, and a
# whitelist of media providers. Everything else is denied. Outbound only.
# Inbound to workers: none (they never listen).
#
# Install (once, for the fleet — applies to all cc-worker-* users via uid match):
#   sudo bash infra/cc-fleet/firewall-apply.sh
#
# This file is pure config, see firewall-apply.sh for the actual enforcement.

# Allowed hosts (resolve at apply time; re-run weekly via cron to track IP churn)
ALLOW_HOSTS=(
  api.supabase.com
  *.supabase.co
  api.github.com
  github.com
  codeload.github.com
  objects.githubusercontent.com
  uploads.github.com
  api.anthropic.com

  # Media providers used by scout/content tickets
  replicate.com
  api.replicate.com
  fal.ai
  api.fal.ai
  byteplus.com

  # Package registries (for npm/gh install within worktrees)
  registry.npmjs.org
  registry.yarnpkg.com
)

# DNS servers (must be in allow list for hostname resolution)
ALLOW_DNS=(
  1.1.1.1
  8.8.8.8
)

# Denied categories (explicit extra safety, covered by default deny)
DENY_CATEGORIES=(
  "social-outbound"   # block slack/discord/telegram/whatsapp APIs unless ticket needs it
  "email-outbound"    # block direct SMTP (force via server SDK with audit trail)
)
